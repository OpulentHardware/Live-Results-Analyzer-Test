name: Update SFR Live Results Data

on:
  workflow_dispatch:
  schedule:
    - cron: '*/10 * * * *'

permissions:
  contents: write

jobs:
  update-results:
    runs-on: ubuntu-latest

    env:
      SFR_SOURCE_URL: https://live.sfrautox.com/#N

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: Fetch and parse SFR live results
        run: npm run fetch:sfr

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update SFR live results data
          file_pattern: data/current-event.json data/source-text.txt
